apiVersion: apps/v1
kind: Deployment
metadata:
  name: adult-aggregator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adult-aggregator
  template:
    metadata:
      labels:
        app: adult-aggregator
    spec:
      containers:
      - name: api
        image: your-registry/adult-aggregator:latest
        ports:
        - containerPort: 4000
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:password@postgres-service:5432/adult_aggregator"
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      - name: worker
        image: your-registry/adult-aggregator:latest
        command: ["npm", "run", "worker"]
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:password@postgres-service:5432/adult_aggregator"
        - name: REDIS_URL
          value: "redis://redis-service:6379"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_DB
          value: "adult_aggregator"
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "password"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-storage
          mountPath: /data
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc